version: '3.8'

services:
  # Relational Database for User Service
  postgres:
    image: postgres:15-alpine
    container_name: fitness-postgres
    environment:
      POSTGRES_DB: fitness_user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Nikky@778
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fitness-network

  # NoSQL Database for Activity and AI Services
  mongodb:
    image: mongo:6
    container_name: fitness-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - fitness-network

  # Centralized Config Server
  config-server:
    build:
      context: ./configserver
      dockerfile: Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - fitness-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/user-service/default"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Netflix Eureka Discovery Server
  eureka-server:
    build:
      context: ./eureka
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - fitness-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway Service
  api-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://host.docker.internal:8181/realms/fitness-oauth2/protocol/openid-connect/certs
    depends_on:
      eureka-server:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fitness-network

  # User Profile Microservice
  user-service:
    build:
      context: ./userservice
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fitness_user_db
    depends_on:
      postgres:
        condition: service_started
      eureka-server:
        condition: service_healthy
    networks:
      - fitness-network

  # Activity Tracking Microservice
  activity-service:
    build:
      context: ./activityservice
      dockerfile: Dockerfile
    container_name: activity-service
    ports:
      - "8082:8082"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_MONGODB_URI: mongodb://mongodb:27017/fitnessactivity
      SPRING_RABBITMQ_HOST: host.docker.internal
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      mongodb:
        condition: service_started
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fitness-network

  # AI Recommendation Microservice
  ai-service:
    build:
      context: ./aiservice
      dockerfile: Dockerfile
    container_name: ai-service
    ports:
      - "8083:8083"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_MONGODB_URI: mongodb://mongodb:27017/fitnessrecommendation
      SPRING_RABBITMQ_HOST: host.docker.internal
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      mongodb:
        condition: service_started
      eureka-server:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fitness-network

  # React Client SPA
  fitness-app-frontend:
    build:
      context: ./fitness-app-frontend
      dockerfile: Dockerfile
    container_name: fitness-frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - fitness-network

networks:
  fitness-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
